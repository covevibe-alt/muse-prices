name: Fetch Muse prices

# Runs hourly + on-demand. Each run pulls Spotify artist stats, Billboard
# Hot 100 chart positions, and YouTube channel statistics, recomputes fair
# prices with smoothing, appends to the rolling history, and commits the
# results back to the repo. GitHub Pages (or any
# static host pointed at this repo) then serves the updated files to the
# frontend with zero infrastructure on our side.
#
# Schedule rationale: hourly is well under Spotify's 3 req/s rate limit
# (we issue ~5 requests per run) and uses ~72 YouTube quota units/day
# (free daily limit is 10 000), leaving plenty of headroom for ad-hoc runs.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SPOTIFY_CLIENT_ID
#   SPOTIFY_CLIENT_SECRET
#   SP_DC                  (optional — Spotify sp_dc cookie for real monthly
#                           listener counts; see fetch-prices.py for setup)
#   YOUTUBE_API_KEY        (optional — omit to disable the YouTube signal)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Never run two price updates in parallel — they'd race on the commit.
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Full history so the bot's rebase-and-push doesn't create a
          # detached state.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install billboard.py

      - name: Run fetcher
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SP_DC: ${{ secrets.SP_DC }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch-prices.py

      - name: Commit updated price data
        run: |
          git config user.name "Muse Price Bot"
          git config user.email "bot@muse.exchange"

          # Save generated files to temp so we can reset cleanly
          DATA_FILES="prices.json prices.js history.json history.js artists.json youtube-channels.json"
          [ -f .market-baseline.json ] && DATA_FILES="$DATA_FILES .market-baseline.json"
          [ -f _debug.txt ] && DATA_FILES="$DATA_FILES _debug.txt"
          mkdir -p /tmp/muse-data
          cp $DATA_FILES /tmp/muse-data/

          # Hard-reset to latest remote — guaranteed no conflicts
          git fetch origin main
          git reset --hard origin/main

          # Put generated files back on top of latest remote
          cp /tmp/muse-data/* .

          git add prices.json prices.js history.json history.js artists.json youtube-channels.json .market-baseline.json _debug.txt
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit."
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%MZ)"
            git push

            # Purge jsDelivr CDN cache so the frontend picks up new data
            # immediately instead of waiting for the branch-resolution TTL.
            echo "Purging jsDelivr CDN cache…"
            curl -sf "https://purge.jsdelivr.net/gh/covevibe-alt/muse-prices@main/prices.json" || true
            curl -sf "https://purge.jsdelivr.net/gh/covevibe-alt/muse-prices@main/prices.js" || true
            curl -sf "https://purge.jsdelivr.net/gh/covevibe-alt/muse-prices@main/history.json" || true
            curl -sf "https://purge.jsdelivr.net/gh/covevibe-alt/muse-prices@main/history.js" || true
            echo "CDN purge requests sent."
          fi
